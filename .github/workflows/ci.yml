name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run --no-sync ruff check .

      - name: Mypy
        run: uv run --no-sync mypy

      - name: Pytest
        run: uv run --no-sync pytest
